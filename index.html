<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HamField Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e13;
  --bg-panel:#121821;
  --bg-panel2:#1a232e;
  --bg-raised:#202b38;
  --border:#26333f;
  --border-soft:#1c2733;
  --accent:#ffb000;
  --accent-dim:#8a6100;
  --accent2:#39d98a;
  --accent2-dim:#1c6b47;
  --danger:#ff5c5c;
  --text:#e9eff4;
  --text-dim:#8ea3b3;
  --text-faint:#5a6d7c;
  --font-display:'Rajdhani',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;overscroll-behavior-y:none;}
body{
  background-image:
    radial-gradient(circle at 15% 0%, rgba(255,176,0,0.06), transparent 45%),
    radial-gradient(circle at 90% 90%, rgba(57,217,138,0.05), transparent 40%);
  min-height:100vh;
}
#app{max-width:640px;margin:0 auto;min-height:100vh;padding:0 0 40px 0;display:flex;flex-direction:column;}
::selection{background:var(--accent);color:#000;}
a{color:var(--accent);}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 10px 18px;
  position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg, var(--bg) 60%, rgba(10,14,19,0.85) 100%);
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:10px;}
.dial{
  width:34px;height:34px;border-radius:50%;
  border:3px solid var(--accent);
  position:relative;
  box-shadow:0 0 14px rgba(255,176,0,0.45), inset 0 0 8px rgba(255,176,0,0.3);
  flex:none;
}
.dial::after{
  content:'';position:absolute;top:50%;left:50%;width:2px;height:13px;
  background:var(--accent);transform-origin:bottom center;
  transform:translate(-50%,-100%) rotate(35deg);
  border-radius:2px;
}
.brand-text{display:flex;flex-direction:column;line-height:1.05;}
.brand-title{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:0.5px;}
.brand-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:1.5px;text-transform:uppercase;}
.icon-btn{
  background:var(--bg-panel2);border:1px solid var(--border);color:var(--text);
  border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.icon-btn:active{background:var(--bg-raised);}

/* ---------- Screen header (module screens) ---------- */
.screen-header{
  display:flex;align-items:center;gap:10px;padding:14px 18px 4px 18px;
}
.back-btn{
  background:var(--bg-panel2);border:1px solid var(--border);color:var(--accent);
  border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
}
.back-btn:active{background:var(--bg-raised);}
.screen-title{font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:0.3px;flex:1;}

.content{padding:14px 18px 30px 18px;flex:1;}

/* ---------- Menu grid ---------- */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 18px 18px 18px;}
.menu-card{
  background:linear-gradient(160deg, var(--bg-panel2), var(--bg-panel));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 14px;text-align:left;color:var(--text);
  display:flex;flex-direction:column;gap:10px;min-height:118px;position:relative;overflow:hidden;
}
.menu-card::before{
  content:'';position:absolute;top:10px;right:12px;width:7px;height:7px;border-radius:50%;
  background:var(--accent2);box-shadow:0 0 8px var(--accent2);
}
.menu-card:active{background:var(--bg-raised);transform:scale(0.98);}
.menu-icon{font-size:26px;}
.menu-label{font-family:var(--font-display);font-weight:700;font-size:15.5px;line-height:1.15;}
.menu-desc{font-size:11px;color:var(--text-dim);line-height:1.3;}
.menu-hero{
  margin:4px 18px 6px 18px;padding:14px 16px;border-radius:var(--radius);
  border:1px solid var(--border-soft);
  background:repeating-linear-gradient(90deg, rgba(255,176,0,0.05) 0 2px, transparent 2px 22px);
  display:flex;justify-content:space-between;align-items:center;
}
.hero-freq{font-family:var(--font-mono);font-size:22px;color:var(--accent);letter-spacing:1px;}
.hero-caption{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ---------- Panels & form elements ---------- */
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.panel-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--accent);margin:0 0 10px 0;letter-spacing:0.3px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11.5px;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.field input, .field select, .field textarea{
  width:100%;background:var(--bg-panel2);border:1px solid var(--border);color:var(--text);
  border-radius:9px;padding:11px 12px;font-size:15px;outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.btn{
  background:var(--accent);color:#1a1200;border:none;border-radius:10px;
  padding:12px 16px;font-weight:700;font-size:14.5px;font-family:var(--font-display);
  letter-spacing:0.3px;width:100%;
}
.btn:active{filter:brightness(0.9);}
.btn.secondary{background:var(--bg-panel2);color:var(--text);border:1px solid var(--border);}
.btn.green{background:var(--accent2);color:#04150c;}
.btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(255,92,92,0.4);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

.readout{
  font-family:var(--font-mono);background:var(--bg-panel2);border:1px solid var(--border);
  border-radius:10px;padding:14px;text-align:center;font-size:26px;color:var(--accent2);
  letter-spacing:2px;margin-bottom:6px;word-break:break-all;
}
.readout-label{text-align:center;font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}
.small-note{font-size:12px;color:var(--text-dim);line-height:1.5;}

/* results table */
.res-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:14px;}
.res-line:last-child{border-bottom:none;}
.res-line .k{color:var(--text-dim);}
.res-line .v{font-family:var(--font-mono);color:var(--text);font-weight:600;}

/* search */
.search-box{position:relative;margin-bottom:12px;}
.search-box input{padding-left:36px;}
.search-box .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);}

/* q-code / phonetic list */
.qc-item{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border-soft);align-items:flex-start;}
.qc-item:last-child{border-bottom:none;}
.qc-code{font-family:var(--font-mono);font-weight:700;color:var(--accent);min-width:56px;font-size:14.5px;}
.qc-q{font-family:var(--font-mono);font-weight:700;color:var(--accent);min-width:34px;font-size:14.5px;}
.qc-meaning{font-size:13.5px;color:var(--text);flex:1;line-height:1.4;}
.tabs{display:flex;gap:8px;margin-bottom:14px;}
.tab{flex:1;text-align:center;padding:10px;border-radius:9px;background:var(--bg-panel2);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-dim);}
.tab.active{background:var(--accent);color:#1a1200;border-color:var(--accent);}

/* log entries */
.log-entry{background:var(--bg-panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.log-call{font-family:var(--font-mono);font-weight:700;font-size:17px;color:var(--accent2);}
.log-meta{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);}
.log-details{font-size:12.5px;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:6px 12px;}
.chip{background:var(--bg-raised);border:1px solid var(--border);padding:2px 8px;border-radius:20px;font-size:11px;color:var(--text);}
.del-x{background:none;border:none;color:var(--text-faint);font-size:16px;padding:2px 6px;}

/* language modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--bg-panel);border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-width:640px;padding:10px 18px 26px 18px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:8px auto 16px auto;}
.lang-option{
  display:flex;align-items:center;justify-content:space-between;padding:14px 8px;border-bottom:1px solid var(--border-soft);font-size:16px;
}
.lang-option:last-child{border-bottom:none;}
.lang-flag{font-size:20px;margin-right:10px;}
.lang-check{color:var(--accent2);font-weight:700;}

.empty-state{text-align:center;padding:36px 12px;color:var(--text-faint);}
.empty-state .e-icon{font-size:38px;margin-bottom:10px;}

.status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:5px 10px;border-radius:20px;background:var(--bg-panel2);border:1px solid var(--border);color:var(--text-dim);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-faint);}
.status-dot.ok{background:var(--accent2);box-shadow:0 0 6px var(--accent2);}
.status-dot.bad{background:var(--danger);box-shadow:0 0 6px var(--danger);}

.solar-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.solar-card{background:var(--bg-panel2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.solar-val{font-family:var(--font-mono);font-size:26px;color:var(--accent);}
.solar-lbl{font-size:10.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

.morse-out{font-family:var(--font-mono);font-size:18px;color:var(--accent2);letter-spacing:3px;background:var(--bg-panel2);border:1px solid var(--border);border-radius:10px;padding:14px;min-height:52px;word-break:break-all;margin-bottom:12px;}
.range-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.range-row input[type=range]{flex:1;accent-color:var(--accent);}
.range-val{font-family:var(--font-mono);color:var(--accent);min-width:60px;text-align:right;font-size:13px;}

.footer-hint{text-align:center;color:var(--text-faint);font-size:11px;padding:18px 20px 4px 20px;}
</style>

/* ======================= QTH LOCATOR ======================= */
function latLonToGrid(lat, lon){
  lon += 180; lat += 90;
  const A = 'ABCDEFGHIJKLMNOPQRSTUVWX';
  const field_lon = Math.floor(lon/20); const field_lat = Math.floor(lat/10);
  const square_lon = Math.floor((lon - field_lon*20)/2); const square_lat = Math.floor((lat - field_lat*10)/1);
  const rem_lon = (lon - field_lon*20 - square_lon*2) * 60; const rem_lat = (lat - field_lat*10 - square_lat*1) * 60;
  const sub_lon = Math.floor(rem_lon/5); const sub_lat = Math.floor(rem_lat/2.5);
  return A[field_lon] + A[field_lat] + square_lon + square_lat + A[sub_lon].toLowerCase() + A[sub_lat].toLowerCase();
}

function fmtLen(m){
  const ft = m*3.28084;
  return `${m.toFixed(2)} m / ${ft.toFixed(2)} ft`;
}
function line(k,v){ return `<div class="res-line"><div class="k">${k}</div><div class="v">${v}</div></div>`; }
function calcAntennas(){
  const f = parseFloat(document.getElementById('antFreq').value);
  const dip = document.getElementById('resDipole');
  const efhw = document.getElementById('resEFHW');
  const vert = document.getElementById('resVert');
  const yagi = document.getElementById('resYagi');
  if(!f || f<=0){ [dip,efhw,vert,yagi].forEach(e=>e.innerHTML=''); return; }
  const lambda = 300/f;
  const dipoleTotal = 142.65/f;
  dip.innerHTML = line(t('ant_total_len'), fmtLen(dipoleTotal)) + line(t('ant_leg_len'), fmtLen(dipoleTotal/2));
  const efhwLen = 142.65/f;
  efhw.innerHTML = line(t('ant_radiator'), fmtLen(efhwLen));
  const vertLen = 71.3/f;
  vert.innerHTML = line(t('ant_radiator'), fmtLen(vertLen)) + line(t('ant_radial'), fmtLen(vertLen));
  const driven = lambda*0.485, reflector = lambda*0.505, director = lambda*0.45;
  const spRD = lambda*0.2, spDD = lambda*0.15;
  yagi.innerHTML = line(t('ant_driven'), fmtLen(driven)) + line(t('ant_reflector'), fmtLen(reflector)) +
    line(t('ant_director'), fmtLen(director)) + line(t('ant_sp_rd'), fmtLen(spRD)) + line(t('ant_sp_dd'), fmtLen(spDD));
}

  const btn = document.getElementById('btnAntCalc');
  if(btn) btn.onclick = calcAntennas;

  }
  const {sfi,k,a,updated} = solarData;

async function fetchSolar(){
  solarError = null; solarData = null;
  const wrap = document.getElementById('solarWrap');
  if(wrap) wrap.innerHTML = solarWrapHtml();
  if(!navigator.onLine){ if(wrap) wrap.innerHTML = solarWrapHtml(); bindSolarRetry(); return; }
  try{
    const [fRes, kRes] = await Promise.all([
      fetch('https://services.swpc.noaa.gov/json/f107_cm_flux.json'),
      fetch('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json')
    ]);
    if(!fRes.ok || !kRes.ok) throw new Error('bad response');
    const fData = await fRes.json();
    const kData = await kRes.json();
    const lastF = fData[fData.length-1];
    const sfi = Math.round(lastF.flux || lastF.f10_7 || 0);
    const lastK = kData[kData.length-1];
    const kVal = parseFloat(lastK[1]);
    const aVal = lastK[2] ? Math.round(parseFloat(lastK[2])) : null;
    solarData = { sfi: sfi || '—', k: isNaN(kVal)?'—':kVal, a: aVal, updated: new Date().toLocaleTimeString() };
  }catch(e){
    solarError = e;
  }
  const wrap2 = document.getElementById('solarWrap');
  if(wrap2){ wrap2.innerHTML = solarWrapHtml(); bindSolarRetry(); }
}
function bindSolarRetry(){
  const b = document.getElementById('btnSolarRetry');
  if(b) b.onclick = fetchSolar;
}

      <input type="range" id="cwTone" min="400" max="1000" step="10" value="700">
      <div class="range-val" id="cwToneVal">700</div>
    </div>
    <div class="btn-row">

    </div>
  </div>
  <div class="panel">
    <div class="panel-title">${t('cw_morse')}</div>
    <div class="morse-out" id="cwMorseOut">&nbsp;</div>
  </div>`;
}
function textToMorse(text){
  return text.toUpperCase().split('').map(ch=>{
    if(ch===' ') return '/';
    return MORSE[ch] || '';
  }).filter(x=>x!=='').join(' ');
}
function bindCW(){
  const wpmSlider = document.getElementById('cwWpm');
  const toneSlider = document.getElementById('cwTone');
  const wpmVal = document.getElementById('cwWpmVal');
  const toneVal = document.getElementById('cwToneVal');
  const textArea = document.getElementById('cwText');
  const morseOut = document.getElementById('cwMorseOut');
  function refreshMorse(){ morseOut.textContent = textToMorse(textArea.value) || '\u00A0'; }
  if(wpmSlider) wpmSlider.oninput = ()=>{ wpmVal.textContent = wpmSlider.value; };
  if(toneSlider) toneSlider.oninput = ()=>{ toneVal.textContent = toneSlider.value; };
  if(textArea){ textArea.oninput = refreshMorse; refreshMorse(); }
  const btnPlay = document.getElementById('btnCwPlay');
  const btnStop = document.getElementById('btnCwStop');
  if(btnPlay) btnPlay.onclick = ()=> playMorse(textArea.value, parseInt(wpmSlider.value), parseInt(toneSlider.value));
  if(btnStop) btnStop.onclick = ()=>{ cwPlaying = false; };
}
function playMorse(text, wpm, toneHz){
  if(!cwAudioCtx) cwAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = cwAudioCtx;
  const unit = 1.2 / wpm; // seconds per dot
  const morse = textToMorse(text);
  cwPlaying = true;
  let t0 = ctx.currentTime + 0.1;
  for(const ch of morse){
    if(ch==='.'){
      scheduleTone(ctx, t0, unit, toneHz); t0 += unit + unit;
    } else if(ch==='-'){
      scheduleTone(ctx, t0, unit*3, toneHz); t0 += unit*3 + unit;
    } else if(ch===' '){
      t0 += unit*2; // total gap between letters = 3 units (1 already added)
    } else if(ch==='/'){
      t0 += unit*4; // word gap
    }
  }
}
function scheduleTone(ctx, startTime, duration, freq){
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.3, startTime+0.005);
  gain.gain.setValueAtTime(0.3, startTime+duration-0.005);
  gain.gain.linearRampToValueAtTime(0, startTime+duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime+duration+0.01);
}

        <div class="lang-option" data-lang="${l[0]}">
          <span><span class="lang-flag">${l[1]}</span>${l[2]}</span>
          ${LANG===l[0]?'<span class="lang-check">✓</span>':''}
        </div>`).join('')}
    </div>`;
  document.body.appendChild(wrap);
  wrap.addEventListener('click', e=>{
    if(e.target===wrap) document.body.removeChild(wrap);
    const opt = e.target.closest('.lang-option');
    if(opt){
      LANG = opt.dataset.lang;
      localStorage.setItem('hamfield_lang', LANG);
      document.body.removeChild(wrap);
      render();
    }
  });
}

/* ======================= EVENT BINDING ======================= */
function bindScreenEvents(){
  const backBtn = document.getElementById('btnBack');
  if(backBtn) backBtn.onclick = ()=> nav('menu');
  const langBtn = document.getElementById('btnLang');
  if(langBtn) langBtn.onclick = openLangModal;
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=> nav(el.dataset.nav);
  });
  if(screen==='qth') bindQTH();
  else if(screen==='qcodes') bindQCodes();
  else if(screen==='antenna') bindAntenna();
  else if(screen==='log') bindLog();
  else if(screen==='solar'){ fetchSolar(); }
  else if(screen==='cw') bindCW();
}

/* ======================= INIT ======================= */
render();
</script>
</body>
</html>
